[package]
name = "dreamspell"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7"}
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum-auth = "0.7"
askama = "0.12"

