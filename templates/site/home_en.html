{% extends "base_site.html" %}
{% block content %}
<body class="d-flex h-100 text-center text-bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
        <header class="mb-auto">
            <div>
                <h3 class="float-md-start mb-0">Dreamspell</h3>
                <nav class="nav nav-masthead justify-content-center float-md-end">
                    <a class="nav-link fw-bold py-1 px-0 active" aria-current="page" href="/">Home</a>
                    <a class="nav-link fw-bold py-1 px-0" href="/">Something</a>
                    <a class="nav-link fw-bold py-1 px-0" href="/">Contact</a>
                </nav>
            </div>
        </header>

        <main class="px-3">
            <h1>Learn your Archetype</h1>
            <p class="lead">Enter your birthdate</p>
            <form action="/en" method="post">
                <p class="lead"><input type="date" name="birth_date" required></p>
                <p class="lead"><input type="submit" class="btn btn-lg btn-light fw-bold border-white bg-white" value="Go!"></p>
            </form>
        </main>

        <footer class="mt-auto text-white-50">
            <p><a href="/" class="text-white">Get personal reading</a></p>
        </footer>
    </div>
</body>
{% endblock %}
