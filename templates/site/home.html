{% extends "base_site.html" %}
{% block content %}
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-auto">
        <div>
            <h3 class="float-md-start mb-0">Dreamspell</h3>
            <nav class="nav nav-masthead justify-content-center float-md-end">
                <a class="nav-link fw-bold py-1 px-0 active" aria-current="page" href="/">Главная</a>
                <a class="nav-link fw-bold py-1 px-0" href="/">Дополнительно</a>
                <a class="nav-link fw-bold py-1 px-0" href="/">Контакты</a>
            </nav>
        </div>
    </header>

    <main class="px-3">
        <h1>Узнай свой архетип</h1>
        <p class="lead">Введите день рождения</p>
        <form action="/" method="post">
            <p class="lead"><input type="date" name="birth_date"></p>
            <p class="lead"><input type="submit" class="btn btn-lg btn-light fw-bold border-white bg-white" value="Узнать!"></p>
        </form>
    </main>

    <footer class="mt-auto text-white-50">
        <p><a href="/" class="text-white">Получить персональное прочтение</a></p>
    </footer>
</div>
{% endblock %}
